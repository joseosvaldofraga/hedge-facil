{% if user.is_authenticated %}
<aside class="hidden md:flex flex-col fixed inset-y-0 left-0 w-60 bg-green-800 text-white z-10">
  <div class="px-6 py-5 border-b border-green-700">
    <span class="font-display font-bold text-xl tracking-tight">HedgeFácil</span>
    <p class="text-xs text-green-400 mt-0.5">gestão de hedge</p>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-0.5">

    {% with ns=request.resolver_match.namespace %}

    <a href="{% url 'posicao:painel' %}"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if ns == 'posicao' %}bg-green-700 text-white{% else %}text-green-100 hover:bg-green-700 hover:text-white{% endif %}">
      <span class="text-base">📊</span> Painel
    </a>

    <a href="{% url 'safra:lista' %}"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if ns == 'safra' %}bg-green-700 text-white{% else %}text-green-100 hover:bg-green-700 hover:text-white{% endif %}">
      <span class="text-base">🌾</span> Safras
    </a>

    {% if safra %}
    <a href="{% url 'vendas:lista' safra.id %}"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if ns == 'vendas' %}bg-green-700 text-white{% else %}text-green-100 hover:bg-green-700 hover:text-white{% endif %}">
      <span class="text-base">📋</span> Vendas
    </a>

    <a href="{% url 'hedge:cenarios' safra.id %}"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if ns == 'hedge' and 'cenarios' in request.path %}bg-green-700 text-white{% else %}text-green-100 hover:bg-green-700 hover:text-white{% endif %}">
      <span class="text-base">📉</span> Cenários
    </a>

    <a href="{% url 'hedge:estrategias' safra.id %}"
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
              {% if ns == 'hedge' and 'estrategias' in request.path %}bg-green-700 text-white{% else %}text-green-100 hover:bg-green-700 hover:text-white{% endif %}">
      <span class="text-base">🛡</span> Estratégias
    </a>
    {% endif %}

    {% endwith %}
  </nav>
  <div class="px-6 py-4 border-t border-green-700">
    <p class="text-xs text-green-400 mb-1">Conectado como</p>
    <p class="text-sm font-medium text-green-100 mb-3">{{ user.username }}</p>
    <form method="post" action="{% url 'contas:logout' %}">
      {% csrf_token %}
      <button type="submit"
        class="text-xs text-green-300 hover:text-white bg-transparent border border-green-600 hover:border-green-400 rounded-lg px-3 py-1.5 cursor-pointer transition-colors w-full">
        Sair da conta
      </button>
    </form>
  </div>
</aside>
{% endif %}
