{% if user.is_authenticated %}
{% with ns=request.resolver_match.namespace %}
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-2 z-10">
  <a href="{% url 'posicao:painel' %}"
     class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg min-w-[56px] {% if ns == 'posicao' %}text-green-700{% else %}text-slate-500{% endif %}">
    <span class="text-xl leading-none">📊</span>
    <span class="text-[10px] font-medium">Posição</span>
  </a>
  <a href="{% url 'safra:lista' %}"
     class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg min-w-[56px] {% if ns == 'safra' %}text-green-700{% else %}text-slate-500{% endif %}">
    <span class="text-xl leading-none">🌾</span>
    <span class="text-[10px] font-medium">Safras</span>
  </a>
  {% if safra %}
  <a href="{% url 'vendas:lista' safra.id %}"
     class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg min-w-[56px] {% if ns == 'vendas' %}text-green-700{% else %}text-slate-500{% endif %}">
    <span class="text-xl leading-none">📋</span>
    <span class="text-[10px] font-medium">Vendas</span>
  </a>
  {% else %}
  <a href="{% url 'safra:nova' %}"
     class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg min-w-[56px] text-slate-400">
    <span class="text-xl leading-none">📋</span>
    <span class="text-[10px] font-medium">Vendas</span>
  </a>
  {% endif %}
  <a href="{% url 'hedge:redirect' %}"
     class="flex flex-col items-center gap-0.5 px-3 py-1 rounded-lg min-w-[56px] {% if ns == 'hedge' %}text-green-700{% else %}text-slate-500{% endif %}">
    <span class="text-xl leading-none">🛡</span>
    <span class="text-[10px] font-medium">Hedge</span>
  </a>
</nav>
{% endwith %}
{% endif %}
