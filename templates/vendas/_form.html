<div id="venda-form">
  <h2 class="font-display text-lg font-bold text-green-800 mb-4">Nova Venda</h2>
  <form method="post"
        hx-post="{% url 'vendas:nova' safra.id %}"
        hx-target="#lista-vendas"
        hx-swap="outerHTML">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="w-full bg-green-700 text-white rounded-lg py-4 font-semibold min-h-[48px]">
      <span class="htmx-indicator-hide">Salvar venda</span>
      <span class="htmx-indicator">Salvando...</span>
    </button>
  </form>
</div>
